<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Section title -->
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#F59E0B" opacity="0.8">WORKFLOW</text>
  <text x="600" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.8" fill="#FFFFFF">Recommended Pipeline</text>

  <!-- Main flow: 4 steps -->
  <!-- Step 1: Review -->
  <g transform="translate(80, 100)">
    <rect width="220" height="100" rx="12" fill="#1A1A24" stroke="#EF4444" stroke-opacity="0.3" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="#EF4444"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#EF4444" opacity="0.8">STEP 1</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Review</text>
    <text x="20" y="74" font-family="system-ui, sans-serif" font-size="12" fill="#71717A">Find what's broken</text>
    <text x="20" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#EF4444" opacity="0.6">/KUI:review</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(310, 145)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="4 4"/>
    <polygon points="50,0 42,-5 42,5" fill="#F59E0B" opacity="0.6"/>
  </g>

  <!-- Step 2: System -->
  <g transform="translate(370, 100)">
    <rect width="220" height="100" rx="12" fill="#1A1A24" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="#F59E0B"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#F59E0B" opacity="0.8">STEP 2</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">System</text>
    <text x="20" y="74" font-family="system-ui, sans-serif" font-size="12" fill="#71717A">Build design foundations</text>
    <text x="20" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#F59E0B" opacity="0.6">/KUI:system</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(600, 145)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="4 4"/>
    <polygon points="50,0 42,-5 42,5" fill="#F59E0B" opacity="0.6"/>
  </g>

  <!-- Step 3: Screen -->
  <g transform="translate(660, 100)">
    <rect width="220" height="100" rx="12" fill="#1A1A24" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="#3B82F6"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#3B82F6" opacity="0.8">STEP 3</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Screen</text>
    <text x="20" y="74" font-family="system-ui, sans-serif" font-size="12" fill="#71717A">Design screens right</text>
    <text x="20" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#3B82F6" opacity="0.6">/KUI:screen</text>
  </g>

  <!-- Arrow 3→4 -->
  <g transform="translate(890, 145)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="4 4"/>
    <polygon points="50,0 42,-5 42,5" fill="#F59E0B" opacity="0.6"/>
  </g>

  <!-- Step 4: Code -->
  <g transform="translate(950, 100)">
    <rect width="220" height="100" rx="12" fill="#1A1A24" stroke="#22C55E" stroke-opacity="0.3" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="#22C55E"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#22C55E" opacity="0.8">STEP 4</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Ship It</text>
    <text x="20" y="74" font-family="system-ui, sans-serif" font-size="12" fill="#71717A">Production-ready code</text>
    <text x="20" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#22C55E" opacity="0.6">/KUI:code</text>
  </g>

  <!-- Supporting commands row -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1" fill="#71717A">RUN ANYTIME</text>

  <g transform="translate(115, 258)">
    <rect width="100" height="30" rx="8" fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.2" stroke-width="1"/>
    <text x="50" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#22C55E">/KUI:a11y</text>
  </g>

  <g transform="translate(310, 258)">
    <rect width="110" height="30" rx="8" fill="#8B5CF6" fill-opacity="0.08" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="55" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#8B5CF6">/KUI:brand</text>
  </g>

  <g transform="translate(505, 258)">
    <rect width="110" height="30" rx="8" fill="#EC4899" fill-opacity="0.08" stroke="#EC4899" stroke-opacity="0.2" stroke-width="1"/>
    <text x="55" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#EC4899">/KUI:figma</text>
  </g>

  <g transform="translate(700, 258)">
    <rect width="140" height="30" rx="8" fill="#8B5CF6" fill-opacity="0.08" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#8B5CF6">/KUI:darkmode</text>
  </g>

  <g transform="translate(925, 258)">
    <rect width="120" height="30" rx="8" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.2" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#06B6D4">/KUI:trends</text>
  </g>
</svg>
