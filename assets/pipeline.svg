    <text x="20" y="52" font-family="'DM Sans', system-ui, sans-serif" font-size="17" font-weight="700" fill="#1A1916">Review</text>
    <text x="20" y="72" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="rgba(26,25,22,0.35)">Find what's broken</text>
  </g>

  <!-- Arrow -->
  <text x="333" y="153" font-family="'DM Sans', sans-serif" font-size="16" fill="rgba(26,25,22,0.20)">&#x2192;</text>

  <!-- Step 2 -->
  <g transform="translate(360, 104)">
    <rect width="240" height="90" rx="12" fill="#FFFFFF" stroke="#E5E1DA" stroke-width="1"/>
