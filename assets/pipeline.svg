<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" fill="none">

  <!-- Background -->
  <rect width="1200" height="280" fill="#F8F7F5"/>

  <!-- Section label -->
  <text x="80" y="42" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" fill="rgba(26,25,22,0.25)">WORKFLOW</text>

  <!-- Section title -->
  <text x="80" y="74" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="#1A1916">Recommended pipeline</text>

  <!-- Flow steps -->
  <!-- Step 1 -->
  <g transform="translate(80, 104)">
