    <text x="20" y="52" font-family="'DM Sans', system-ui, sans-serif" font-size="17" font-weight="700" fill="#1A1916">System</text>
    <text x="20" y="72" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="rgba(26,25,22,0.35)">Build design foundations</text>
  </g>

  <!-- Arrow -->
  <text x="613" y="153" font-family="'DM Sans', sans-serif" font-size="16" fill="rgba(26,25,22,0.20)">&#x2192;</text>

  <!-- Step 3 -->
  <g transform="translate(640, 104)">
    <rect width="240" height="90" rx="12" fill="#FFFFFF" stroke="#E5E1DA" stroke-width="1"/>
    <text x="20" y="30" font-family="'DM Sans', system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.8" fill="rgba(26,25,22,0.25)">STEP 3</text>
    <text x="20" y="52" font-family="'DM Sans', system-ui, sans-serif" font-size="17" font-weight="700" fill="#1A1916">Screen</text>
    <text x="20" y="72" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="rgba(26,25,22,0.35)">Design screens properly</text>
  </g>

  <!-- Arrow -->
  <text x="893" y="153" font-family="'DM Sans', sans-serif" font-size="16" fill="rgba(26,25,22,0.20)">&#x2192;</text>

