    <rect width="98" height="26" rx="13" fill="rgba(26,25,22,0.04)" stroke="rgba(26,25,22,0.10)" stroke-width="1"/>
    <text x="49" y="18" text-anchor="middle" font-family="'DM Mono', ui-monospace, monospace" font-size="11" font-weight="500" fill="rgba(26,25,22,0.55)">/KUI:trends</text>
